name: Site Health Check

# Daily health check — verifies site is up and key pages return 200
on:
  schedule:
    - cron: '30 7 * * *'   # 07:30 UTC — after local CTO runs

  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check site availability
        run: |
          SITE_URL="https://becabotinha-boop.github.io/becawell-reviews"
          echo "Checking: $SITE_URL"

          check_url() {
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$1")
            if [ "$code" -lt 400 ]; then
              echo "  [OK] $1 → HTTP $code"
            else
              echo "  [FAIL] $1 → HTTP $code"
              return 1
            fi
          }

          check_url "$SITE_URL/"
          check_url "$SITE_URL/data/products.json"
          check_url "$SITE_URL/assets/style.css"
          check_url "$SITE_URL/assets/app.js"
          check_url "$SITE_URL/alpilean-review.html"   # spot check a review page

      - name: Validate products.json freshness
        run: |
          curl -s "https://becabotinha-boop.github.io/becawell-reviews/data/products.json" > /tmp/products.json
          python3 << 'EOF'
          import json, sys
          from datetime import datetime, timezone, timedelta

          with open('/tmp/products.json') as f:
              data = json.load(f)

          products = data.get('products', [])
          print(f"Products found: {len(products)}")

          if len(products) < 10:
              print("WARNING: fewer than 10 products — data layer may be stale")
              sys.exit(1)

          # Check at least some Tier A products exist
          tier_a = [p for p in products if p.get('tier') == 'A']
          print(f"Tier A products: {len(tier_a)}")
          if not tier_a:
              print("CRITICAL: No Tier A products — scoring pipeline may have failed")
              sys.exit(1)

          print("products.json health: OK")
          EOF

      - name: Post health summary
        if: always()
        run: |
          echo "## Health Check — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Site: https://becabotinha-boop.github.io/becawell-reviews" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-failure',
              state: 'open',
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[HEALTH FAILURE] Site degraded ${new Date().toISOString().slice(0, 10)}`,
                body: [
                  '## Site Health Check Failed',
                  '',
                  `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  '**Action required:** Check BFF server, re-run deploy pipeline.',
                ].join('\n'),
                labels: ['health-failure', 'automated'],
              });
            }
