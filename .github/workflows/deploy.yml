name: Deploy BecaWell Reviews

# Triggers:
#   1. repository_dispatch — fired by local deploy_pipeline.py via GitHub API
#   2. push to main — standard CI/CD on code change
#   3. workflow_dispatch — manual trigger from GitHub UI
#   4. schedule — daily 06:00 UTC as fallback if local cron missed
on:
  repository_dispatch:
    types: [deploy, data-refresh, force-deploy]

  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'assets/**'
      - '*.html'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'manual trigger'

  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily fallback

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true   # cancel stale deploys if a newer one fires

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    outputs:
      html_count: ${{ steps.count.outputs.html_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Count HTML files
        id: count
        run: |
          count=$(find . -name "*.html" | wc -l)
          echo "html_count=$count" >> $GITHUB_OUTPUT
          echo "HTML files found: $count"

      - name: Validate JSON data files
        run: |
          for f in data/*.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))" && echo "  OK" || exit 1
          done

      - name: Check for required files
        run: |
          required=(
            "data/products.json"
            "assets/style.css"
            "assets/app.js"
          )
          for f in "${required[@]}"; do
            [ -f "$f" ] && echo "  [OK] $f" || (echo "  [MISSING] $f" && exit 1)
          done

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post deploy summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **HTML files:** ${{ needs.validate.outputs.html_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: failure()

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DEPLOY FAILED] ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Deploy Pipeline Failure',
                '',
                `- **Trigger:** ${context.eventName}`,
                `- **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### Next Steps',
                '1. Check the run logs above',
                '2. Re-run `python scripts/pipelines/funnel.py` locally with `FORCE_DEPLOY=1`',
                '3. Or trigger manually via GitHub UI → Actions → Deploy',
              ].join('\n'),
              labels: ['deploy-failure', 'automated'],
            });
